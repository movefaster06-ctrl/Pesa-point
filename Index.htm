// ── SMS PARSER ────────────────────────────────────────────────────────────────
function parseLocal(sms){
  if(!sms||!sms.trim())return null;
  const raw=sms;const txt=sms.toLowerCase();
  const pv=v=>parseFloat((v||"0").toString().replace(/,/g,""));
  const commM=raw.match(/(?:preview\s+)?commission\s*:\s*([\d,]+(?:\.\d{1,2})?)\s*TZS/i)||raw.match(/(?:preview\s+)?commission[^0-9]*([\d,]+(?:\.\d{1,2})?)/i);
  const profit=commM?pv(commM[1]):0;
  const balM=raw.match(/(?:new\s+)?balance\s*:\s*([\d,]+(?:\.\d{1,2})?)\s*TZS/i)||raw.match(/(?:new|agent|float|current)\s+balance[^0-9]*([\d,]+(?:\.\d{1,2})?)/i)||raw.match(/balance[^0-9]*([\d,]+(?:\.\d{1,2})?)\s*TZS/i);
  const balance_after=balM?pv(balM[1]):0;
  const refM=raw.match(/\bTnx\s+(\d{8,})/i)||raw.match(/(?:trans(?:action)?\s*id|ref(?:erence)?)[:\s]+([A-Z0-9]{6,20})/i)||raw.match(/\b([A-Z]{2,3}[0-9]{7,12})\b/);
  const ref=refM?(refM[1]||"").trim():"";
  const phoneInParens=raw.match(/\((\d{10,12})\)/);
  const phoneFor=raw.match(/\bfor\s+((?:255|0)[67]\d{8})\b/i);
  const phoneAny=raw.match(/\b((?:255|0)[67]\d{8})\b/);
  const customer_phone=(phoneInParens||phoneFor||phoneAny||[])[1]||"";
  let customer_name="";
  const cap1=raw.match(/(?:to|from)\s+([A-Z][A-Z\s]{4,}?)\s*\(\d/);
  const cap2=raw.match(/\b([A-Z]{2,}(?:\s+[A-Z]{2,}){1,4})\s*(?:\(|\d{10}|at\s+\d)/);
  if(cap1)customer_name=cap1[1].trim();else if(cap2)customer_name=cap2[1].trim();
  customer_name=customer_name.replace(/\s+[A-Z]$/,"").trim();
  let network="OTHER";
  if(/m[-\s]?pesa|mpesa/i.test(txt))network="M-PESA";
  else if(/airtel/i.test(txt))network="AIRTEL";
  else if(/tigo/i.test(txt))network="TIGO";
  else if(/halo\s?pesa/i.test(txt))network="HALOPESA";
  else if(/t[-\s]?pesa/i.test(txt))network="T-PESA";
  let type="OTHER";
  if(/deposited\s+[\d,]+\s+TZS\s+to/i.test(txt))type="CASH_IN";
  else if(/withdraw|cash.?out|toa\s*pesa|unatoa/i.test(txt))type="CASH_OUT";
  else if(/you have received|received from/i.test(txt))type="RECEIVE";
  else if(/\bpaid\s+[\d,]+\s+TZS\s+for\b/i.test(txt))type=/airtime/i.test(txt)?"AIRTIME":"BUNDLE";
  else if(/airtime/i.test(txt))type="AIRTIME";
  else if(/bundle|data pack|internet/i.test(txt))type="BUNDLE";
  else if(/you have sent|sent to|umetuma/i.test(txt))type="SEND";
  else if(/deposit/i.test(txt))type="CASH_IN";
  const mainAmtM=raw.match(/(?:Deposited|Paid|Withdrawn|Sent|Received)\s+([\d,]+(?:\.\d{1,2})?)\s+TZS/i);
  let amount=mainAmtM?pv(mainAmtM[1]):0;
  if(!amount){
    const numB=/([\d,]+(?:\.\d{1,2})?)\s+TZS/g,numA=/TZS\s+([\d,]+(?:\.\d{1,2})?)/g;
    const all=[];let m;
    while((m=numB.exec(raw))!==null)all.push(pv(m[1]));
    while((m=numA.exec(raw))!==null)all.push(pv(m[1]));
    const cand=all.filter(v=>Math.abs(v-balance_after)>1&&Math.abs(v-profit)>1&&v>0);
    if(cand.length)amount=Math.max(...cand);
  }
  const dtM=raw.match(/at\s+(\d{2}\/\d{2}\/\d{4}\s+\d{2}:\d{2}:\d{2})/i);
  let sms_date=null;
  if(dtM){const p=dtM[1].split(/[\s\/:/]/);sms_date=new Date(`${p[2]}-${p[1]}-${p[0]}T${p[3]}:${p[4]}:${p[5]}`).getTime();}
  const summary=`${TM[type]?.label||type} — ${customer_name||customer_phone||"Transaction"} — TZS ${fmt(amount)}`;
  return{type,amount,profit,customer_name,customer_phone,ref,network,balance_after,summary,sms_date};
}
async function parseAI(sms){
  const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
    headers:{"Content-Type":"application/json","anthropic-version":"2023-06-01"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,
      system:`Parse Tanzanian mobile money agent SMS. Return ONLY valid JSON. No markdown.
Fields: type(CASH_IN|CASH_OUT|AIRTIME|BUNDLE|SEND|RECEIVE|OTHER),amount(number),profit(commission TZS or 0),customer_name,customer_phone,ref,network(M-PESA|AIRTEL|TIGO|HALOPESA|T-PESA|OTHER),balance_after(float balance or 0),summary(50 chars).
"Deposited X TZS to NAME(phone)"=CASH_IN. "Paid X TZS for phone"=BUNDLE/AIRTIME. "Preview Commission: X TZS"=profit.`,
      messages:[{role:"user",content:sms}]})});
  if(!res.ok)throw new Error("HTTP "+res.status);
  const d=await res.json();
  const txt=(d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
  return JSON.parse(txt.replace(/```[\w]*\n?|```/g,"").trim());
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function AuthScreen({onLogin}){
  const [mode,setMode]=useState("login");
  const [step,setStep]=useState("form"); // form | verify
  const [f,setF]=useState({email:"",username:"",password:"",confirm:""});
  const [err,setErr]=useState({});
  const [loading,setLoading]=useState(false);
  const [pendingUser,setPendingUser]=useState(null);
  const [otp,setOtp]=useState("");
  const [otpInput,setOtpInput]=useState("");
  const [otpErr,setOtpErr]=useState("");
  const [emailSent,setEmailSent]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  const validate=()=>{
    const e={};
    if(mode==="register"){
      if(!f.email||!f.email.includes("@"))e.email="Enter a valid email address";
      if(!f.username||f.username.length<3)e.username="At least 3 characters";
      if(!f.password||f.password.length<6)e.password="At least 6 characters";
      if(f.password!==f.confirm)e.confirm="Passwords do not match";
    }else{
      if(!f.username)e.username="Enter your username";
      if(!f.password)e.password="Enter your password";
    }
    setErr(e);return Object.keys(e).length===0;
  };

  const submit=async()=>{
    if(!validate())return;
    setLoading(true);setErr({});
    setTimeout(async()=>{
      const users=db.get(USERS_KEY)||{};
      if(mode==="register"){
        if(users[f.username.toLowerCase()]){setErr({username:"Username already taken"});setLoading(false);return;}
        const uid=Math.random().toString(36).slice(2,10);
        const code=genOTP();
        setOtp(code);
        const newUser={uid,username:f.username,email:f.email,pw:hashPw(f.password),avatar:"",created:Date.now(),verified:false};
        const cfg=db.get(cfgKey(uid))||DEF_CFG;
        const sent=await sendOTPEmail(f.email,f.username,code,cfg||DEF_CFG);
        setEmailSent(sent);
        setPendingUser(newUser);
        setStep("verify");
      }else{
        const u=users[f.username.toLowerCase()];
        if(!u||u.pw!==hashPw(f.password)){setErr({password:"Incorrect username or password"});setLoading(false);return;}
        db.set(SESSION_KEY,{uid:u.uid,username:u.username});
        onLogin(u);
      }
      setLoading(false);
    },400);
  };

  const verifyOTP=()=>{
    if(otpInput.trim()!==otp){setOtpErr("Wrong code. Please try again.");return;}
    const users=db.get(USERS_KEY)||{};
    pendingUser.verified=true;
    users[pendingUser.username.toLowerCase()]=pendingUser;
    db.set(USERS_KEY,users);
    db.set(SESSION_KEY,{uid:pendingUser.uid,username:pendingUser.username});
    onLogin(pendingUser);
  };

  const resend=async()=>{
    const code=genOTP();setOtp(code);setOtpInput("");setOtpErr("");
    const cfg=DEF_CFG;
    const sent=await sendOTPEmail(pendingUser.email,pendingUser.username,code,cfg);
    setEmailSent(sent);
  };

  if(step==="verify") return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:C.bg}},
    h("img",{src:LOGO_SRC,style:{width:120,marginBottom:20,borderRadius:12},alt:"Pesa Point"}),
    h(Card,{style:{width:"100%",maxWidth:400},className:"au"},
      h("div",{style:{textAlign:"center",marginBottom:20}},
        h("div",{style:{width:56,height:56,borderRadius:"50%",background:C.gdim,border:`2px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,margin:"0 auto 12px"}},emailSent?"📧":"🔑"),
        h("div",{style:{fontSize:18,fontWeight:900,color:C.text,marginBottom:6}},"Verify your account"),
        emailSent
          ?h("div",{style:{fontSize:13,color:C.sub,lineHeight:1.7}},"A 6-digit code was sent to ",h("span",{style:{color:C.green}},pendingUser.email),". Check your inbox (and spam folder).")
          :h("div",{style:{fontSize:13,color:C.warn,lineHeight:1.7,background:C.warndim,borderRadius:8,padding:"10px 12px"}},"Email not sent — EmailJS is not configured yet. Your code is shown below for now.")
      ),
      !emailSent&&h("div",{style:{background:C.s3,border:`1px solid ${C.br}`,borderRadius:10,padding:"14px",textAlign:"center",marginBottom:16}},
        h("div",{style:{fontSize:11,color:C.sub,marginBottom:6}},"YOUR VERIFICATION CODE"),
        h("div",{style:{fontSize:36,fontWeight:900,letterSpacing:8,color:C.green,fontVariantNumeric:"tabular-nums"}},otp),
        h("div",{style:{fontSize:11,color:C.dim,marginTop:6}},"Write it down, then enter it below")
      ),
      h(Inp,{label:"Enter the 6-digit code",type:"text",maxLength:6,value:otpInput,onChange:e=>setOtpInput(e.target.value.replace(/\D/g,"")),placeholder:"123456",error:otpErr}),
      h(Btn,{full:true,onClick:verifyOTP,disabled:otpInput.length<6},"✓ Verify & Create Account"),
      h("div",{style:{textAlign:"center",marginTop:12,fontSize:12,color:C.sub}},
        "Didn't receive it? ",
        h("span",{style:{color:C.green,cursor:"pointer",fontWeight:700},onClick:resend},"Resend code")
      )
    )
  );

  return h("div",{style:{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",background:C.bg}},
    h("div",{style:{textAlign:"center",marginBottom:28}},
      h("img",{src:LOGO_SRC,style:{width:140,marginBottom:12,borderRadius:12},alt:"Pesa Point"}),
      h("div",{style:{fontSize:12,color:C.sub}},mode==="login"?"Welcome back — sign in to continue":"Create your agent account")
    ),
    h("div",{style:{width:"100%",maxWidth:400},className:"au"},
      h("div",{style:{display:"flex",background:C.s2,border:`1px solid ${C.br}`,borderRadius:12,padding:3,marginBottom:20}},
        [["login","Sign In"],["register","Register"]].map(([id,l])=>h("button",{key:id,onClick:()=>{setMode(id);setErr({});},style:{flex:1,padding:"10px 0",border:"none",borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:700,background:mode===id?C.brand:"transparent",color:mode===id?"#fff":C.dim,transition:"all .2s"}},l))
      ),
      h(Card,null,
        mode==="register"&&h(Inp,{label:"Email address",type:"email",placeholder:"you@email.com",value:f.email,onChange:e=>set("email",e.target.value),error:err.email}),
        h(Inp,{label:"Username",placeholder:mode==="register"?"Choose a username":"Your username",value:f.username,onChange:e=>set("username",e.target.value),error:err.username}),
        h(Inp,{label:"Password",type:"password",placeholder:mode==="register"?"Min 6 characters":"Your password",value:f.password,onChange:e=>set("password",e.target.value),error:err.password}),
        mode==="register"&&h(Inp,{label:"Confirm password",type:"password",value:f.confirm,onChange:e=>set("confirm",e.target.value),error:err.confirm}),
        h(Btn,{full:true,onClick:submit,disabled:loading,color:C.brand,style:{marginTop:4}},
          loading?[h(Spin,{key:"s",color:"#fff"}),mode==="register"?"Creating…":"Signing in…"]
                 :mode==="register"?"Create Account →":"Sign In →"
        )
      ),
      h("div",{style:{textAlign:"center",marginTop:14,fontSize:13,color:C.sub}},
        mode==="login"
          ?["No account? ",h("span",{key:"l",style:{color:C.brand,cursor:"pointer",fontWeight:700},onClick:()=>{setMode("register");setErr({});}}, "Register")]
          :["Have an account? ",h("span",{key:"l",style:{color:C.brand,cursor:"pointer",fontWeight:700},onClick:()=>{setMode("login");setErr({});}}, "Sign In")]
      )
    )
  );
}

  const [avatarLoading,setAvatarLoading]=useState(false);
  const fileRef=useRef();
  const set=(k,v)=>setS(p=>({...p,[k]:v}));
  const allUsers=db.get(USERS_KEY)||{};
  const fullUser=allUsers[user.username.toLowerCase()]||user;

  const doSave=()=>{saveCfg(s);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const allP=txns.reduce((a,t)=>a+(t.profit||0),0);
  const latestFloat=txns.find(t=>t.balance_after>0)?.balance_after||0;

  const handleAvatar=e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>2*1024*1024){alert("Image too large. Please choose an image under 2MB.");return;}
    setAvatarLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      const src=ev.target.result;
      const users=db.get(USERS_KEY)||{};
      if(users[user.username.toLowerCase()]){users[user.username.toLowerCase()].avatar=src;db.set(USERS_KEY,users);}
      setAvatarLoading(false);
      // Force re-render
      window.location.reload();
    };
    reader.readAsDataURL(file);
  };

  return h("div",{style:{padding:"18px 14px"}},
    h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}},
      h("h2",{style:{fontSize:20,fontWeight:900}},"Settings"),
      latestFloat>0&&h(FloatBadge,{balance:latestFloat})
    ),

    // Profile card
    h(Card,{style:{marginBottom:14}},
      h(Lbl,{t:"Profile",color:C.brand}),
      h("div",{style:{display:"flex",alignItems:"center",gap:14,marginBottom:16}},
        h("div",{style:{position:"relative"}},
          h(Avatar,{src:fullUser.avatar,name:user.username,size:72}),
          h("button",{onClick:()=>fileRef.current.click(),style:{position:"absolute",bottom:-2,right:-2,width:24,height:24,borderRadius:"50%",background:C.brand,border:"2px solid "+C.bg,color:"#fff",fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}},avatarLoading?h(Spin,{size:10,color:"#fff"}):"✎")
        ),
        h("input",{ref:fileRef,type:"file",accept:"image/*",style:{display:"none"},onChange:handleAvatar}),
        h("div",null,
          h("div",{style:{fontSize:16,fontWeight:700,color:C.text}},user.username),
          h("div",{style:{fontSize:12,color:C.sub,marginTop:2}},fullUser.email||""),
          h("div",{style:{fontSize:11,color:C.brand,marginTop:2,fontWeight:600}},fullUser.verified?"✓ Verified account":"Account not verified"),
          h("div",{style:{fontSize:11,color:C.dim,marginTop:2}},"Tap ✎ to change profile photo")
        )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,textAlign:"center"}},
        h("div",null,h("div",{style:{fontSize:22,fontWeight:900}},txns.length),h("div",{style:{fontSize:10,color:C.dim,marginTop:2}},"Transactions")),
        h("div",null,h("div",{style:{fontSize:17,fontWeight:900,color:C.gold}},fmtI(allP)),h("div",{style:{fontSize:10,color:C.dim,marginTop:2}},"Total profit")),
        h("div",null,h("div",{style:{fontSize:13,fontWeight:700,color:latestFloat<50000?C.warn:C.green}},fmtI(latestFloat)),h("div",{style:{fontSize:10,color:C.dim,marginTop:2}},"Current float"))
      )
    ),

    // Business info
    h(Card,{style:{marginBottom:14}},
      h(Lbl,{t:"Business Info",color:C.brand}),
      h(Inp,{label:"Business Name",value:s.name||"",onChange:e=>set("name",e.target.value)}),
      h(Inp,{label:"Your Name",value:s.owner||"",onChange:e=>set("owner",e.target.value)})
    ),

    // Commission rates
    h(Card,{style:{marginBottom:14}},
      h(Lbl,{t:"Default Commission Rates",color:C.brand}),
      h("p",{style:{fontSize:12,color:C.sub,margin:"2px 0 14px",lineHeight:1.7}},"Used only when commission is NOT stated in the SMS."),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}},
        [["cash_in","Cash In %"],["cash_out","Cash Out %"],["airtime","Airtime %"],["bundle","Bundle %"]].map(([k,l])=>
          h("div",{key:k},
            h(Lbl,{t:l}),
            h("div",{style:{display:"flex",alignItems:"center",gap:6}},
              h("input",{type:"number",step:.1,min:0,max:20,value:s[k]||"",onChange:e=>set(k,parseFloat(e.target.value)||0),style:{...IS,maxWidth:80}}),
              h("span",{style:{fontSize:12,color:C.sub}},"%")
            ),
            s[k]>0&&h("div",{style:{fontSize:10,color:C.green,marginTop:3}},"50K → TZS "+Math.round(50000*s[k]/100).toLocaleString())
          )
        )
      )
    ),

    // EmailJS config
    h(Card,{style:{marginBottom:14}}),
    h("div",{style:{background:C.s2,border:`1px solid ${C.br}`,borderRadius:14,padding:16,marginBottom:14}},
      h(Lbl,{t:"Email Verification (EmailJS)",color:C.brand}),
      h("div",{style:{background:"rgba(0,230,118,.05)",border:`1px solid rgba(0,230,118,.12)`,borderRadius:10,padding:"10px 12px",marginBottom:14,fontSize:12,color:C.sub,lineHeight:1.8}},
        h("div",{style:{fontWeight:700,color:C.green,marginBottom:4}},"How to enable email verification:"),
        "1. Go to ",h("span",{style:{color:C.green,fontWeight:700}},"emailjs.com")," and create a free account",h("br"),
        "2. Create an Email Service (connect your Gmail)",h("br"),
        "3. Create a Template with variables: ",h("code",{style:{background:C.s4,padding:"1px 4px",borderRadius:3,fontSize:11}},"{{to_email}}, {{to_name}}, {{otp_code}}"),h("br"),
        "4. Copy your Public Key, Service ID and Template ID below"
      ),
      h(Inp,{label:"EmailJS Public Key",value:s.ejs_pub||"",onChange:e=>set("ejs_pub",e.target.value),placeholder:"user_xxxxxxxxxxxx"}),
      h(Inp,{label:"EmailJS Service ID",value:s.ejs_svc||"",onChange:e=>set("ejs_svc",e.target.value),placeholder:"service_xxxxxxxx"}),
      h(Inp,{label:"EmailJS Template ID",value:s.ejs_tpl||"",onChange:e=>set("ejs_tpl",e.target.value),placeholder:"template_xxxxxxxx"})
    ),

    h(Btn,{full:true,onClick:doSave,color:saved?C.s3:C.brand,style:{marginBottom:14,borderColor:C.brand,color:saved?C.brand:"#fff"}},saved?"✓  Saved!":"Save Settings"),

    h("div",{style:{background:C.reddim,border:`1px solid rgba(255,82,82,.2)`,borderRadius:12,padding:14}},
      h(Lbl,{t:"Danger Zone",color:C.red}),
      h("p",{style:{fontSize:12,color:C.sub,margin:"2px 0 12px",lineHeight:1.6}},"Permanently delete all transaction records. Your account stays."),
      !danger
        ?h(Btn,{outline:true,color:C.red,small:true,onClick:()=>setDanger(true)},"Delete all data")
        :h("div",{style:{display:"flex",gap:8},className:"ai"},
          h(Btn,{color:C.red,style:{flex:1},onClick:()=>{saveAll([]);setDanger(false);}},"Yes, delete all"),
          h(Btn,{outline:true,color:C.sub,style:{flex:1},onClick:()=>setDanger(false)},"Cancel")
        )
    )
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [txns,setTxns]=useState([]);
  const [cfg,setCfg]=useState(DEF_CFG);
  const [tab,setTab]=useState("home");
  const [ready,setReady]=useState(false);
  useEffect(()=>{const s=db.get(SESSION_KEY);if(s&&s.uid){setUser(s);setTxns(db.get(txnKey(s.uid))||[]);setCfg({...DEF_CFG,...(db.get(cfgKey(s.uid))||{})});}setReady(true);},[]);
  const onLogin=u=>{setUser(u);setTxns(db.get(txnKey(u.uid))||[]);setCfg({...DEF_CFG,...(db.get(cfgKey(u.uid))||{})});setTab("home");};
  const onLogout=()=>{db.del(SESSION_KEY);setUser(null);setTxns([]);setCfg(DEF_CFG);};
  const saveTxns=list=>{setTxns(list);if(user)db.set(txnKey(user.uid),list);};
  const saveCfg=c=>{setCfg(c);if(user)db.set(cfgKey(user.uid),c);};
  if(!ready)return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,gap:12,flexDirection:"column"}},h(Spin,{size:32,color:C.brand}),h("span",{style:{color:C.sub,fontSize:13}},"Loading…"));
  if(!user)return h(AuthScreen,{onLogin});
  const sh={txns,save:saveTxns,cfg,saveCfg,user,setTab};
  return h("div",{style:{fontFamily:"'DM Sans',system-ui,sans-serif",background:C.bg,color:C.text,height:"100%",maxWidth:480,margin:"0 auto",display:"flex",flexDirection:"column"}},
    h("div",{style:{flex:1,overflowY:"auto"}},
      tab==="home"&&h(Home,{...sh,onLogout}),
      tab==="add" &&h(AddScreen,sh),
      tab==="hist"&&h(HistoryScreen,{txns,save:saveTxns}),
      tab==="cfg" &&h(SettingsScreen,{...sh,saveAll:saveTxns}),
    ),
    h(Nav,{tab,set:setTab})
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
